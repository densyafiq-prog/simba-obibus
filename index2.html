<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADIDAS SAMBA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <header>
        <div class="logo">ADIDAS SAMBA</div>
        <button class="join-btn">PROMO</button>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-text">
            <p class="tagline">Elegan dan Keren</p>
            <h1>NAON IEU TEH</h1>
            <h2>HARGA MIRING</h2>
            <p>
                Akhir bulan tapi tetep pengen gaya, Beli sepatu adidas saja, mumpung lagi ada harga miring
                Harga miring belum tentu membuat penampilan garing
            </p>
            <div class="buttons">
                <button class="btn-light">SPESIAL</button>
                <button class="btn-light">HARI INI</button>
            </div>
        </div>

        <div class="hero-image">
            <img src="adidas1.jpg" alt="fashion model">
            <img src="adidas2.jpg" alt="fashion model">
            <img src="adidas3.jpg" alt="fashion model">
            <img src="adidas4.jpg" alt="fashion model">
            <img src="adidas5.jpg" alt="fashion model">
        </div>
    </section>

    <!-- Products Section -->
    <section class="products">
        <h3>CEPAT BELI SEBELUM KEHABISAN.</h3>
        <h1>PRODUK TERBARU</h1>

        <div class="product-grid">
            <div class="card">
                <img src="adidas1.jpg" width="200" height="149">
            </div>
            <div class="card">
                 <img src="adidas2.jpg" width="200" height="149">
            </div>
            <div class="card">
                 <img src="adidas3.jpg" width="200" height="149">
            </div>
            <div class="card">
                 <img src="adidas4.jpg" width="200" height="149">
            </div>
        </div>
    </section>

</body>
</html>
